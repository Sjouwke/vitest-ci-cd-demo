on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen & aan virtuele machine koppelen
        uses: actions/checkout@v4
      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Dependencies installeren
        run: npm install
      - name: Tests uitvoeren
        run: npm run test
